<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>FlightRoster</title>

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FlightRoster"/>
  <meta name="theme-color" content="#0A0E1A"/>
  <link rel="manifest" href="manifest.json"/>

  <!-- iOS icons (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="icon.png"/>

  <!-- React + Babel from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background: #0A0E1A; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Storage ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = "flightroster_v1";
    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch { return null; }
    }
    function save(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    function uid() { return Math.random().toString(36).slice(2, 10); }
    function hhmm(min) {
      if (!min && min !== 0) return "–";
      const h = Math.floor(min / 60), m = min % 60;
      return `${h}h ${String(m).padStart(2, "0")}m`;
    }
    // Append Zulu suffix to an HH:MM time string
    function z(t) { return t ? t + "Z" : "–"; }
    function flightDuration(dep, arr) {
      if (!dep || !arr) return null;
      const [dh, dm] = dep.split(":").map(Number);
      const [ah, am] = arr.split(":").map(Number);
      let mins = (ah * 60 + am) - (dh * 60 + dm);
      if (mins < 0) mins += 24 * 60;
      return mins;
    }
    // Actual block time = ON BLOCK (IN) − OFF BLOCK (OUT)
    function actualBlock(f) {
      if (!f.offBlock || !f.onBlock) return null;
      return flightDuration(f.offBlock, f.onBlock);
    }
    // Air time = LANDING (ON) − TAKEOFF (OFF)
    function airTime(f) {
      if (!f.takeoff || !f.landing) return null;
      return flightDuration(f.takeoff, f.landing);
    }
    // Difference in minutes between two date+time points (handles cross-day)
    function minsBetween(d1, t1, d2, t2) {
      if (!d1 || !t1 || !d2 || !t2) return null;
      const a = new Date(`${d1}T${t1}:00`);
      const b = new Date(`${d2}T${t2}:00`);
      if (isNaN(a) || isNaN(b)) return null;
      return Math.round((b - a) / 60000);
    }
    // Turnaround between consecutive flights at the same airport (arr A == dep B)
    function turnaround(a, b) {
      if (!a || !b || a.arr !== b.dep) return null;
      const inT  = a.onBlock  || a.sta;
      const outT = b.offBlock || b.std;
      const m = minsBetween(a.date, inT, b.date, outT);
      if (m === null || m < 0) return null;
      return m;
    }

    const STATUS_COLORS = {
      scheduled: "#3B82F6",
      completed: "#22C55E",
      cancelled: "#EF4444",
      standby:   "#F59E0B",
    };
    const STATUS_LABELS = { scheduled:"SCHED", completed:"DONE", cancelled:"CXLD", standby:"STBY" };

    // ── Seed data ─────────────────────────────────────────────────────────────
    const SEED = {
      flights: [
        { id: uid(), date:"2026-06-02", callsign:"FR1234", flightNumber:"FR 1234", aircraft:"B737-800", dep:"MXP", arr:"DUB", std:"06:25", sta:"08:10", offBlock:"06:30", takeoff:"06:42", landing:"08:05", onBlock:"08:12", role:"CPT", status:"completed", notes:"" },
        { id: uid(), date:"2026-06-02", callsign:"FR1235", flightNumber:"FR 1235", aircraft:"B737-800", dep:"DUB", arr:"MXP", std:"09:05", sta:"12:50", offBlock:"", takeoff:"", landing:"", onBlock:"", role:"CPT", status:"scheduled", notes:"" },
        { id: uid(), date:"2026-06-05", callsign:"EZY401", flightNumber:"EZY 401", aircraft:"A320neo", dep:"LIN", arr:"LGW", std:"07:40", sta:"09:15", offBlock:"", takeoff:"", landing:"", onBlock:"", role:"F/O", status:"scheduled", notes:"Sim check ride" },
      ],
    };

    // ── Theme ─────────────────────────────────────────────────────────────────
    const T = {
      bg:       "#0A0E1A",
      surface:  "#111827",
      card:     "#1C2333",
      border:   "#2A3450",
      accent:   "#3B82F6",
      accentDim:"#1D4ED8",
      gold:     "#F59E0B",
      text:     "#F1F5F9",
      sub:      "#94A3B8",
      muted:    "#475569",
      green:    "#22C55E",
      red:      "#EF4444",
    };

    const CSS = `
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
      html,body{background:${T.bg};color:${T.text};font-family:'Rajdhani',sans-serif;min-height:100vh;overscroll-behavior:none;}
      input,select,textarea{font-family:'Rajdhani',sans-serif;background:${T.surface};color:${T.text};border:1px solid ${T.border};border-radius:8px;padding:10px 12px;font-size:15px;width:100%;outline:none;transition:border .2s;}
      input:focus,select:focus,textarea:focus{border-color:${T.accent};}
      input[type=date]{color-scheme:dark;}
      button{cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.5px;}
      ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:${T.border};border-radius:4px;}
      .slide-up{animation:slideUp .25s ease;}
      @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      .fade{animation:fade .2s ease;}
      @keyframes fade{from{opacity:0}to{opacity:1}}
      .inner{max-width:860px;margin:0 auto;width:100%;}
    `;

    // ── Tag ───────────────────────────────────────────────────────────────────
    function Tag({ color, children }) {
      return (
        <span style={{background:color+"22",color,border:`1px solid ${color}44`,
          borderRadius:4,padding:"1px 7px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
          fontWeight:600,letterSpacing:.5}}>
          {children}
        </span>
      );
    }

    // ── BottomNav ─────────────────────────────────────────────────────────────
    function BottomNav({ tab, setTab }) {
      const items = [
        { id:"roster", label:"Roster", icon:"📋" },
        { id:"gen",    label:"Gen",    icon:"🎲" },
        { id:"add",    label:"Add",    icon:"➕" },
        { id:"stats",  label:"Stats",  icon:"📊" },
      ];
      return (
        <nav style={{position:"fixed",bottom:0,left:0,right:0,background:T.surface,
          borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100,
          paddingBottom:"env(safe-area-inset-bottom)"}}>
          <div className="inner" style={{display:"flex",width:"100%"}}>
            {items.map(it => (
              <button key={it.id} onClick={() => setTab(it.id)}
                style={{flex:1,padding:"10px 0",background:"none",border:"none",
                  color: tab===it.id ? T.accent : T.muted,
                  display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  fontSize:10,letterSpacing:.8,fontWeight:700,transition:"color .2s"}}>
                <span style={{fontSize:20}}>{it.icon}</span>
                {it.label.toUpperCase()}
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // ── FlightCard ────────────────────────────────────────────────────────────
    function FlightCard({ flight, onEdit, onDelete }) {
      const dur = flightDuration(flight.std, flight.sta);
      const ab = actualBlock(flight);
      const at = airTime(flight);
      const sc = STATUS_COLORS[flight.status] || T.accent;
      return (
        <div className="slide-up" style={{background:T.card,borderRadius:12,padding:"14px 16px",
          borderLeft:`3px solid ${sc}`,marginBottom:10}}>
          {/* Top row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                fontSize:16,color:T.accent,letterSpacing:1}}>{flight.callsign}</span>
              {flight.flightNumber && (
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,
                  color:T.sub,marginLeft:8,letterSpacing:.5}}>#{flight.flightNumber}</span>
              )}
              {" "}
              <span style={{fontSize:12,color:T.sub}}>{flight.aircraft}</span>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <Tag color={sc}>{STATUS_LABELS[flight.status]||flight.status}</Tag>
              <Tag color={T.gold}>{flight.role||"CPT"}</Tag>
            </div>
          </div>

          {/* Route row */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:26,
                lineHeight:1,color:T.text}}>{flight.dep}</div>
              <div style={{fontSize:11,color:T.sub,fontFamily:"'JetBrains Mono',monospace"}}>{z(flight.std)}</div>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",height:1,background:`linear-gradient(90deg,${T.accent},${T.accentDim})`,position:"relative"}}>
                <span style={{position:"absolute",left:"50%",top:-8,transform:"translateX(-50%)",
                  fontSize:14,color:T.accent}}>✈</span>
              </div>
              <span style={{fontSize:11,color:T.muted,fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>
                {dur ? hhmm(dur) : "–"}
              </span>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:26,
                lineHeight:1,color:T.text}}>{flight.arr}</div>
              <div style={{fontSize:11,color:T.sub,fontFamily:"'JetBrains Mono',monospace"}}>{z(flight.sta)}</div>
            </div>
          </div>

          {/* Date + notes */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:T.muted}}>{flight.date}</span>
            {flight.notes && <span style={{fontSize:12,color:T.sub,fontStyle:"italic",maxWidth:"55%",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{flight.notes}</span>}
          </div>

          {/* Actual times (OOOI) */}
          {(ab !== null || at !== null) && (
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              {ab !== null && (
                <span style={{background:T.green+"18",color:T.green,border:`1px solid ${T.green}33`,
                  borderRadius:6,padding:"2px 9px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
                  BLK {hhmm(ab)}
                </span>
              )}
              {at !== null && (
                <span style={{background:T.accent+"18",color:T.accent,border:`1px solid ${T.accent}33`,
                  borderRadius:6,padding:"2px 9px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
                  AIR {hhmm(at)}
                </span>
              )}
              {flight.offBlock && (
                <span style={{fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono',monospace",alignSelf:"center"}}>
                  OUT {flight.offBlock}Z{flight.takeoff?` · OFF ${flight.takeoff}Z`:""}{flight.landing?` · ON ${flight.landing}Z`:""}{flight.onBlock?` · IN ${flight.onBlock}Z`:""}
                </span>
              )}
            </div>
          )}

          {/* Actions */}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={() => onEdit(flight)}
              style={{flex:1,background:T.border,border:"none",borderRadius:8,
                padding:"7px 0",color:T.text,fontSize:13,fontWeight:700}}>EDIT</button>
            <button onClick={() => onDelete(flight.id)}
              style={{background:"none",border:`1px solid ${T.red}44`,borderRadius:8,
                padding:"7px 14px",color:T.red,fontSize:13,fontWeight:700}}>✕</button>
          </div>
        </div>
      );
    }

    // ── FlightForm ────────────────────────────────────────────────────────────
    const EMPTY = { callsign:"", flightNumber:"", aircraft:"", dep:"", arr:"", std:"", sta:"", date:"", offBlock:"", takeoff:"", landing:"", onBlock:"", role:"CPT", status:"scheduled", notes:"" };

    function FlightForm({ initial, onSave, onCancel }) {
      const [f, setF] = useState(initial || EMPTY);
      const set = (k, v) => setF(p => ({ ...p, [k]: v }));
      const dur = flightDuration(f.std, f.sta);
      const ab = actualBlock(f);
      const at = airTime(f);

      const field = (label, key, type="text", extra={}) => (
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>
            {label}
          </label>
          {type === "select" ? (
            <select value={f[key]} onChange={e => set(key, e.target.value)}>
              {extra.options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          ) : type === "textarea" ? (
            <textarea value={f[key]} onChange={e => set(key, e.target.value)}
              rows={2} style={{resize:"none"}} placeholder={extra.placeholder||""}/>
          ) : (
            <input type={type} value={f[key]}
              onChange={e => set(key, type==="text" ? e.target.value.toUpperCase() : e.target.value)}
              placeholder={extra.placeholder||""} maxLength={extra.maxLength}/>
          )}
        </div>
      );

      return (
        <div style={{padding:"16px 16px 100px"}}>
          <h2 style={{fontWeight:700,fontSize:20,marginBottom:16,color:T.text,letterSpacing:.5}}>
            {initial?.id ? "✏️ EDIT FLIGHT" : "➕ ADD FLIGHT"}
          </h2>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div>{field("CALLSIGN","callsign","text",{placeholder:"FR1234"})}</div>
            <div>{field("FLIGHT NUMBER","flightNumber","text",{placeholder:"FR 1234"})}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div>{field("AIRCRAFT","aircraft","text",{placeholder:"B737-800"})}</div>
            <div>{field("DATE","date","date")}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div>
              <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>DEPARTURE (ICAO)</label>
              <input value={f.dep} onChange={e => set("dep", e.target.value.toUpperCase())} placeholder="MXP" maxLength={4} style={{marginBottom:12}}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>ARRIVAL (ICAO)</label>
              <input value={f.arr} onChange={e => set("arr", e.target.value.toUpperCase())} placeholder="DUB" maxLength={4} style={{marginBottom:12}}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>STD (Z)</label>
              <input type="time" value={f.std} onChange={e => set("std", e.target.value)} style={{marginBottom:12}}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>STA (Z)</label>
              <input type="time" value={f.sta} onChange={e => set("sta", e.target.value)} style={{marginBottom:12}}/>
            </div>
          </div>

          {dur !== null && (
            <div style={{background:T.surface,borderRadius:8,padding:"8px 12px",marginBottom:12,
              fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.green}}>
              🕐 Scheduled block: {hhmm(dur)}
            </div>
          )}

          {/* Actual times — OOOI */}
          <div style={{borderTop:`1px solid ${T.border}`,marginTop:4,paddingTop:14,marginBottom:4}}>
            <div style={{fontSize:13,color:T.gold,fontWeight:700,letterSpacing:.8,marginBottom:2}}>
              ACTUAL TIMES — OOOI
            </div>
            <div style={{fontSize:11,color:T.muted,marginBottom:12}}>
              Tutti gli orari in UTC / Zulu (Z) — per il conteggio ore di volo
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              <div>
                <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>OFF BLOCK (OUT) Z</label>
                <input type="time" value={f.offBlock} onChange={e => set("offBlock", e.target.value)} style={{marginBottom:12}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>TAKEOFF (OFF) Z</label>
                <input type="time" value={f.takeoff} onChange={e => set("takeoff", e.target.value)} style={{marginBottom:12}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>LANDING (ON) Z</label>
                <input type="time" value={f.landing} onChange={e => set("landing", e.target.value)} style={{marginBottom:12}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:12,color:T.sub,marginBottom:4,letterSpacing:.8,fontWeight:600}}>ON BLOCK (IN) Z</label>
                <input type="time" value={f.onBlock} onChange={e => set("onBlock", e.target.value)} style={{marginBottom:12}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1,background:T.surface,borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:10,color:T.muted,letterSpacing:.8}}>BLOCK TIME</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,color:T.green,fontWeight:600}}>
                  {ab !== null ? hhmm(ab) : "–"}
                </div>
              </div>
              <div style={{flex:1,background:T.surface,borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <div style={{fontSize:10,color:T.muted,letterSpacing:.8}}>AIR TIME</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,color:T.accent,fontWeight:600}}>
                  {at !== null ? hhmm(at) : "–"}
                </div>
              </div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <div>{field("ROLE","role","select",{options:[{v:"CPT",l:"Captain"},{v:"F/O",l:"First Officer"},{v:"TRN",l:"Trainee"}]})}</div>
            <div>{field("STATUS","status","select",{options:Object.entries(STATUS_LABELS).map(([v,l])=>({v,l}))})}</div>
          </div>
          {field("NOTES","notes","textarea",{placeholder:"Optional notes…"})}

          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button onClick={() => {
              if (!f.callsign || !f.dep || !f.arr || !f.date) return;
              onSave({ ...f, id: f.id || uid() });
            }} style={{flex:1,background:T.accent,border:"none",borderRadius:10,
              padding:"13px 0",color:"#fff",fontSize:16,fontWeight:700}}>
              SAVE FLIGHT
            </button>
            {onCancel && (
              <button onClick={onCancel}
                style={{background:T.border,border:"none",borderRadius:10,
                  padding:"13px 18px",color:T.text,fontSize:16,fontWeight:700}}>✕</button>
            )}
          </div>
        </div>
      );
    }

    // ── Stats ─────────────────────────────────────────────────────────────────
    function Stats({ flights }) {
      const done = flights.filter(f => f.status === "completed");
      const total = flights.length;
      const totalMins = flights.reduce((s,f) => { const d=flightDuration(f.std,f.sta); return s+(d||0); }, 0);
      const doneMins  = done.reduce((s,f)  => { const d=flightDuration(f.std,f.sta); return s+(d||0); }, 0);

      // Actual logged hours from OOOI
      const blockMins = flights.reduce((s,f) => s + (actualBlock(f)||0), 0);
      const airMins   = flights.reduce((s,f) => s + (airTime(f)||0), 0);
      const loggedCount = flights.filter(f => actualBlock(f) !== null).length;

      const acMap = {};
      flights.forEach(f => { const a=f.aircraft||"Unknown"; acMap[a]=(acMap[a]||0)+1; });
      const acList = Object.entries(acMap).sort((a,b)=>b[1]-a[1]);

      const routeMap = {};
      flights.forEach(f => { const r=`${f.dep}→${f.arr}`; routeMap[r]=(routeMap[r]||0)+1; });
      const routeList = Object.entries(routeMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

      const roles = {};
      flights.forEach(f => { const r=f.role||"CPT"; roles[r]=(roles[r]||0)+1; });

      const StatBox = ({label,value,sub,color=T.accent}) => (
        <div style={{background:T.card,borderRadius:12,padding:"14px 16px",flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:T.muted,letterSpacing:.8,marginBottom:4}}>{label}</div>
          <div style={{fontSize:24,fontWeight:700,color,lineHeight:1}}>{value}</div>
          {sub && <div style={{fontSize:11,color:T.sub,marginTop:4}}>{sub}</div>}
        </div>
      );

      return (
        <div style={{padding:"16px 16px 100px"}} className="fade">
          <h2 style={{fontWeight:700,fontSize:20,marginBottom:16,letterSpacing:.5}}>📊 STATISTICS</h2>

          <div style={{fontSize:12,color:T.gold,fontWeight:700,letterSpacing:.8,marginBottom:8}}>LOGGED HOURS (ACTUAL)</div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <StatBox label="BLOCK TIME" value={hhmm(blockMins)} sub={`${loggedCount} logged`} color={T.green}/>
            <StatBox label="AIR TIME" value={hhmm(airMins)} sub="off→on" color={T.accent}/>
          </div>

          <div style={{fontSize:12,color:T.gold,fontWeight:700,letterSpacing:.8,marginBottom:8,marginTop:10}}>ROSTER OVERVIEW</div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <StatBox label="TOTAL FLIGHTS" value={total} sub={`${done.length} completed`}/>
            <StatBox label="SCHED BLOCK" value={hhmm(totalMins)} sub={`${hhmm(doneMins)} done`} color={T.sub}/>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            <StatBox label="SECTORS" value={total} sub="all types" color={T.gold}/>

    // ── EASA ORO.FTL.205 Table 2 — max daily FDP (acclimatised) ─────────────────
    function maxDailyFDP(localStartMin, sectors) {
      const m = ((localStartMin % 1440) + 1440) % 1440;
      const inB = (h1,m1,h2,m2) => {
        const a=h1*60+m1, b=h2*60+m2;
        return a<=b ? (m>=a && m<=b) : (m>=a || m<=b);
      };
      let base;
      if      (inB(6,0,13,29))  base=780; // 13:00
      else if (inB(13,30,13,59))base=765;
      else if (inB(14,0,14,29)) base=750;
      else if (inB(14,30,14,59))base=735;
      else if (inB(15,0,15,29)) base=720;
      else if (inB(15,30,15,59))base=705;
      else if (inB(16,0,16,29)) base=690;
      else if (inB(16,30,16,59))base=675;
      else if (inB(17,0,4,59))  base=660; // 17:00–04:59 night band → 11:00
      else if (inB(5,0,5,14))   base=720;
      else if (inB(5,15,5,29))  base=735;
      else if (inB(5,30,5,44))  base=750;
      else /* 5,45–5,59 */      base=765;
      const reduced = base - 30 * Math.max(0, sectors - 2);
      return Math.max(540, reduced); // floor 9:00
    }

    function zToLocalMin(zHHMM, tz) {
      const [h,mm] = zHHMM.split(":").map(Number);
      return (((h+tz)*60 + mm) % 1440 + 1440) % 1440;
    }
    function inWOCL(localMin) { return localMin >= 120 && localMin <= 359; } // 02:00–05:59

    function addMin(zHHMM, mins) {
      const [h,mm] = zHHMM.split(":").map(Number);
      let t = (h*60+mm+mins) % 1440; if (t<0) t+=1440;
      return `${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;
    }
    function minBetweenZ(a, b) {
      const pa = a.split(":").map(Number), pb = b.split(":").map(Number);
      let d = (pb[0]*60+pb[1]) - (pa[0]*60+pa[1]);
      if (d < 0) d += 1440;
      return d;
    }

    // ── Rotation generator ──────────────────────────────────────────────────────
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function generateRotation({ opKey, baseKey, date, role, sectorsWanted }) {
      const OP = OPERATORS[opKey];
      const B  = OP.bases[baseKey];
      const slots = ["03:00","03:30","04:00","04:30","05:00","08:00","10:00","12:00","14:00"];
      for (let attempt=0; attempt<300; attempt++) {
        const report = pick(slots);
        const nRound = sectorsWanted ? sectorsWanted/2 : pick([1,2,2,3]);
        const sectors = nRound*2;
        // bias realism with block-time ceilings per number of round trips
        const ceil = nRound>=3 ? 130 : nRound===2 ? 185 : 999;
        const pool = B.routes.filter(r => r.block <= ceil);
        if (pool.length === 0) continue;
        const dests = [];
        for (let i=0;i<nRound;i++) dests.push(pick(pool));

        let cursor = addMin(report, OP.report); // STD1
        const legs = [];
        let fnum = 1000 + Math.floor(Math.random()*8000);
        for (let i=0;i<nRound;i++){
          const d = dests[i];
          const std1 = cursor, sta1 = addMin(std1, d.block);
          legs.push({ dep:baseKey, arr:d.icao, std:std1, sta:sta1, block:d.block, fn:fnum++ });
          const std2 = addMin(sta1, OP.turnOut), sta2 = addMin(std2, d.block);
          legs.push({ dep:d.icao, arr:baseKey, std:std2, sta:sta2, block:d.block, fn:fnum++ });
          cursor = addMin(sta2, OP.turnBase);
        }

        const fdpEnd = legs[legs.length-1].sta;
        const fdp = minBetweenZ(report, fdpEnd);
        const localStart = zToLocalMin(report, B.tz);
        const maxFDP = maxDailyFDP(localStart, sectors);
        const dayBlock = legs.reduce((s,l)=>s+l.block,0);

        let wocl=false;
        for (let t=0;t<=fdp;t+=15){
          if (inWOCL((localStart + t) % 1440)) { wocl=true; break; }
        }

        if (fdp <= maxFDP && fdp <= 13*60) {
          return {
            opKey, baseKey, fleet:OP.fleet, csPrefix:OP.csPrefix, fnPrefix:OP.fnPrefix,
            date, role, report, fdp, maxFDP, margin:maxFDP-fdp,
            sectors, dayBlock, wocl, localStart, tz:B.tz, legs
          };
        }
      }
      return null;
    }

                      </div>
                    </div>
                    {next && turn!==null && (
                      <div style={{fontSize:11,color: turn<OP.turnOut?T.gold:T.muted,
                        fontFamily:"'JetBrains Mono',monospace",margin:"0 0 8px 8px"}}>
                        ⟳ {hhmm(turn)} @ {l.arr}
                      </div>
                    )}
                  </div>
                );
              })}

              <button onClick={addToRoster} disabled={!legal}
                style={{width:"100%",background: legal?T.green:T.border,border:"none",borderRadius:10,
                  padding:"13px 0",color:legal?"#06240f":T.muted,fontSize:16,fontWeight:700,
                  marginTop:6,cursor:legal?"pointer":"not-allowed"}}>
                {legal ? "ADD TO ROSTER" : "CANNOT ADD (illegal)"}
              </button>
            </div>
          )}
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("roster");
      const [flights, setFlights] = useState(() => load()?.flights || SEED.flights);
      const [editing, setEditing] = useState(null);

      useEffect(() => { save({ flights }); }, [flights]);

      const saveFlight = useCallback((f) => {
        setFlights(prev => {
          const idx = prev.findIndex(x => x.id === f.id);
          return idx >= 0 ? prev.map(x => x.id===f.id ? f : x) : [...prev, f];
        });
        setEditing(null);
        setTab("roster");
      }, []);

      const deleteFlight = useCallback((id) => {
        setFlights(prev => prev.filter(f => f.id !== id));
      }, []);

      const handleEdit = useCallback((f) => {
        setEditing(f);
        setTab("add");
      }, []);

      const addRotation = useCallback((newFlights) => {
        setFlights(prev => [...prev, ...newFlights]);
        setTab("roster");
      }, []);

      return (
        <>
          <style>{CSS}</style>
          <header style={{background:T.surface,borderBottom:`1px solid ${T.border}`,
            padding:"12px 16px 10px",position:"sticky",top:0,zIndex:50}}>
            <div className="inner" style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>✈</span>
              <div>
                <div style={{fontWeight:700,fontSize:17,letterSpacing:1.5,lineHeight:1}}>FLIGHTROSTER</div>
                <div style={{fontSize:10,color:T.muted,letterSpacing:1.5}}>SIM OPERATIONS · ALL TIMES Z</div>
              </div>
            </div>
          </header>

          <main>
            <div className="inner">
              {tab === "roster" && <RosterTab flights={flights} onEdit={handleEdit} onDelete={deleteFlight}/>}
              {tab === "gen"    && <GenTab onAdd={addRotation}/>}
              {tab === "add"    && <FlightForm initial={editing} onSave={saveFlight}
                onCancel={editing ? () => { setEditing(null); setTab("roster"); } : null}/>}
              {tab === "stats"  && <Stats flights={flights}/>}
            </div>
          </main>

          <BottomNav tab={tab} setTab={t => { if (t==="add") setEditing(null); setTab(t); }}/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
